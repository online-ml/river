name: code-quality

on:
  pull_request:
    branches:
      - "*"
  push:
    branches:
      - main

jobs:
  ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Cache datasets
        uses: actions/cache@v4
        with:
          path: ~/river_data
          key: river-data-${{ hashFiles('river/datasets/**/*.py', 'river/bandit/datasets/**/*.py', 'Makefile') }}
          restore-keys: |
            river-data-

      - name: Download datasets
        run: uv run make download-datasets

      - name: Run tests
        run: uv run pytest

      - name: Install pre-commit
        uses: actions/cache@v3
        with:
          path: ~/.cache/pre-commit/
          key: pre-commit|${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

  no-pandas:
    name: Tests without pandas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Cache datasets
        uses: actions/cache@v4
        with:
          path: ~/river_data
          key: river-data-${{ hashFiles('river/datasets/**/*.py', 'river/bandit/datasets/**/*.py', 'Makefile') }}
          restore-keys: |
            river-data-

      - name: Download datasets
        run: uv run make download-datasets

      - name: Uninstall pandas
        run: uv pip uninstall pandas

      - name: Run tests
        run: uv run --no-sync pytest

  sdist-build:
    name: Build wheel from sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Build sdist and wheel from sdist
        run: uv build --python 3.13

      - name: Install wheel and smoke-test the native extension
        run: |
          uv venv --python 3.13 .venv-wheel
          uv pip install --python .venv-wheel/bin/python dist/*.whl
          .venv-wheel/bin/python -c "import river; from river._river_rust import stats, drift, tree, vectordict"
