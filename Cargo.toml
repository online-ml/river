[package]
name = "river"
version = "0.1.0"
authors = ["Adil Zouitine <adilzouitinegm@gmail.com>"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[lib]
name = "river"
path = "rust_src/lib.rs"
crate-type = ["cdylib", "rlib"]

[features]
default = ["pyo3-bindings"]
pyo3-bindings = ["pyo3"]

[dependencies]
pyo3 = { version = "0.27.2", features = ["extension-module"], optional = true }
bincode = "1.3.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
num = "0.4"
ordered-float = { version = "3.9", features = ["serde"] }

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "stats_bench"
harness = false
